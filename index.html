<html lang="en">

    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="LearnUp - Priya's 56-Day Coding Journey from Python to Agentic AI" />
    <title>LearnUp 🌸 — Priya's Learning Journey</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- GitHub Pages SPA redirect handler -->
    <script>
      (function() {
        var p = new URLSearchParams(window.location.search).get('p');
        if (p) {
          window.history.replaceState(
            null, null,
            '/learnup' + decodeURIComponent(p)
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
