<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LearnUp</title>
  <script>
    // GitHub Pages SPA 404 redirect for /learnup project
    // When GitHub returns a 404, redirect back to the app base with the path encoded
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      '/learnup/?p=' + encodeURIComponent(
        l.pathname.replace('/learnup', '') + l.search + l.hash
      )
    );
  </script>
</head>
<body></body>
</html>
